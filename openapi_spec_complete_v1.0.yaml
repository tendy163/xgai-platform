openapi: 3.0.3
info:
  title: XG-AI Complete API Specification v1.0
  version: 1.0.0
  description: Complete API specification for XG-AI platform with 6 microservices
    and 91 endpoints
servers:
- url: http://localhost:3006
  description: Auth Service (development)
- url: http://localhost:3007
  description: Chat Service
- url: http://localhost:3008
  description: Quant Service
- url: http://localhost:3009
  description: Client Service
- url: http://localhost:3010
  description: Notification Service
- url: http://localhost:3000
  description: API Gateway
tags:
- name: authentication
  description: User authentication and authorization
- name: users
  description: User management and profiles
- name: conversations
  description: Chat conversations and messages
- name: stocks
  description: Stock data and analysis
- name: notifications
  description: User notifications
- name: client
  description: Client version management
- name: system
  description: System configuration and monitoring
paths:
  /auth/register:
    post:
      summary: Register new user
      description: Create a new user account
      operationId: registerUser
  /auth/login:
    post:
      summary: Login user
      description: Authenticate user with email/password
      operationId: loginUser
  /auth/profile:
    put:
      summary: "更新用户资料"
      tags:
      - "用户"
      security:
      - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: "更新成功"
        '400':
          description: "参数错误"
  /auth/logout:
    post:
      summary: Logout user
      description: Invalidate current session
      operationId: logoutUser
  /auth/refresh:
    post:
      tags:
      - "认证"
      summary: "刷新Token"
      description: "使用refresh_token刷新access_token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: "刷新成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: "refresh_token无效或已过期"
  /users:
    get:
      tags:
      - "用户"
      summary: "获取用户列表"
      description: "获取用户列表，支持分页和过滤"
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: "页码，从1开始"
      - in: query
        name: size
        schema:
          type: integer
          default: 20
          maximum: 100
        description: "每页数量"
      - in: query
        name: sort_by
        schema:
          type: string
          default: created_at
        description: "排序字段"
      - in: query
        name: sort_order
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
        description: "排序方向"
      responses:
        '200':
          description: "获取成功"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: "未授权"
        '403':
          description: "权限不足"
  /users/{user_id}:
    get:
      tags:
      - "用户"
      summary: "获取用户详情"
      description: "根据用户ID获取用户详细信息"
      operationId: getUserById
  /conversations:
    get:
      summary: Get user conversations
      description: Get list of conversations for current user
      operationId: getConversations
    post:
      summary: Create conversation
      description: Create a new conversation
      operationId: createConversation
  /conversations/{id}:
    get:
      summary: Get conversation details
      description: Get specific conversation by ID
      operationId: getConversation
    put:
      summary: Update conversation
      description: Update conversation details
      operationId: updateConversation
    delete:
      summary: Delete conversation
      description: Delete conversation by ID
      operationId: deleteConversation
  /conversations/{id}/messages:
    get:
      summary: Get conversation messages
      description: Get messages in a conversation
      operationId: getMessages
    post:
      summary: Send message
      description: Send a new message to conversation
      operationId: sendMessage
  /messages/{id}:
    get:
      summary: Get message
      description: Get specific message by ID
      operationId: getMessage
    put:
      summary: Update message
      description: Update message content
      operationId: updateMessage
    delete:
      summary: Delete message
      description: Delete message by ID
      operationId: deleteMessage
  /stocks:
    get:
      summary: Get stock list
      description: Get list of stocks with filtering
      operationId: getStocks
  /stocks/{symbol}:
    get:
      summary: Get stock details
      description: Get specific stock information
      operationId: getStock
  /stocks/{symbol}/prices:
    get:
      summary: Get stock prices
      description: Get historical prices for stock
      operationId: getStockPrices
  /stocks/{symbol}/indicators:
    get:
      summary: Get technical indicators
      description: Get technical indicators for stock
      operationId: getTechnicalIndicators
  /stocks/{symbol}/alerts:
    get:
      summary: Get stock alerts
      description: Get alerts for specific stock
      operationId: getStockAlerts
    post:
      summary: Create stock alert
      description: Create a new alert for stock
      operationId: createStockAlert
  /alerts/{id}:
    get:
      summary: Get alert
      description: Get specific alert by ID
      operationId: getAlert
    put:
      summary: Update alert
      description: Update alert configuration
      operationId: updateAlert
    delete:
      summary: Delete alert
      description: Delete alert by ID
      operationId: deleteAlert
  /notifications:
    get:
      summary: Get notifications
      description: Get user notifications
      operationId: getNotifications
  /notifications/{id}:
    get:
      summary: Get notification
      description: Get specific notification
      operationId: getNotification
    put:
      summary: Mark notification as read
      description: Mark notification as read
      operationId: markNotificationRead
  /client/version:
    get:
      summary: Get client version
      description: Get current client version
      operationId: getClientVersion
  /system/health:
    get:
      summary: Health check
      description: Check system health status
      operationId: healthCheck
  /system/metrics:
    get:
      summary: Get system metrics
      description: Get system performance metrics
      operationId: getMetrics
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        full_name:
          type: string
      required:
      - id
      - email
      - username
    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
        avatar_url:
          type: string
      required: []
    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
      required:
      - access_token
      - expires_in
    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
      required:
      - items
      - total
      - page
      - size
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT